name: Build and Deploy
on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
      - run: npm install

      - run: echo "Running tests..."
      - run: npm test

      - run: echo "Building the project..."
      - run: npm build

